# docker-compose.yml for mcp-prediction
# Deploy: Portainer → Stacks → Add from Repository → GitOps polling
# CI/CD: GitHub Actions builds image on push, updates this tag automatically
#
# SECURITY: This file was generated following PAI hardened container policy.
# Do NOT add: docker.sock mounts, privileged mode, host network/PID,
# extra capabilities, or secrets in environment variables.

services:
  mcp-prediction:
    image: ghcr.io/nsoult-agentic/mcp-prediction:sha-039ade2
    container_name: mcp-prediction
    restart: unless-stopped

    # ── Network ──
    ports:
      - "127.0.0.1:8908:8908"  # Loopback ONLY — no external access

    # ── Security Hardening ──
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource Limits ──
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

    # ── Filesystem ──
    volumes:
      # Secrets — root-owned on host, read-only in container
      - /srv/mcp-prediction/secrets:/secrets:ro
      # Data — SQLite database (read-write for agent, read-only mount for dashboard)
      - /srv/mcp-prediction/data:/data
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8908/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # ── Environment ──
    environment:
      - NODE_ENV=production
      - SECRETS_DIR=/secrets
      - DATA_DIR=/data
      - PORT=8908
      - EXCHANGE_MODE=mock
      # NEVER put API keys here — read from /secrets/ files
